<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SpamShield Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
</head>
<body>
    <h1>SpamShield Chat</h1>
    <div id="chat">
        <input id="username" placeholder="Username" />
        <input id="room" placeholder="Room" />
        <button onclick="joinRoom()">Join Room</button>
        <br><br>
        <input id="message" placeholder="Message" onkeypress="sendMessage(event)" />
        <button onclick="send()">Send</button>
        <div id="messages"></div>
    </div>

    <script>
        const socket = io();
        const messages = document.getElementById('messages');

        function joinRoom() {
            const username = document.getElementById('username').value;
            const room = document.getElementById('room').value;
            socket.emit('join', {username, room});
        }

        function sendMessage(event) {
            if (event.key === 'Enter') {
                send();
            }
        }

        function send() {
            const msg = document.getElementById('message').value;
            const sender = document.getElementById('username').value;
            const room = document.getElementById('room').value;
            socket.emit('message', {msg, sender, room});
            document.getElementById('message').value = '';
        }

        socket.on('status', (msg) => {
            messages.innerHTML += `<p><strong>${msg}</strong></p>`;
        });

        socket.on('response', (data) => {
            messages.innerHTML += `<p><strong>${data.sender}:</strong> ${data.msg}</p>`;
        });
    </script>
</body>
</html>
